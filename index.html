<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora Shop | RegisCode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fdf2f8; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.2); }
        .badge { position: absolute; top: -5px; right: -5px; background: #db2777; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <!-- Nav -->
    <nav class="fixed w-full z-50 px-6 py-4 flex justify-between items-center glass">
        <div class="text-2xl serif font-bold text-pink-600 tracking-widest">FLORA</div>
        <div class="flex gap-6">
            <button class="relative text-2xl">❤️ <span id="fav-count" class="badge">0</span></button>
            <button onclick="toggleCart()" class="relative text-2xl">🛒 <span id="cart-count" class="badge">0</span></button>
        </div>
    </nav>

    <!-- Content -->
    <main class="pt-28 pb-20 px-6 max-w-6xl mx-auto">
        <h1 class="text-4xl md:text-5xl serif text-center mb-12 italic text-gray-800">Մեր Ծաղկեփնջերը</h1>
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </main>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full md:w-96 bg-white shadow-2xl z-[60] transform translate-x-full transition-transform p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <h2 class="text-2xl serif">Ձեր Զամբյուղը</h2>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="space-y-4"></div>
        <div class="mt-10 border-t pt-6">
            <div class="flex justify-between text-xl mb-6"><span>Ընդամենը:</span><span id="cart-total" class="font-bold">0 ֏</span></div>
            <button onclick="openOrderModal()" class="w-full bg-pink-600 text-white py-4 rounded-xl font-bold uppercase tracking-widest">Պատվիրել</button>
        </div>
    </div>

    <!-- Order Modal -->
    <div id="order-modal" class="fixed inset-0 bg-black/60 z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md">
            <h3 class="text-2xl serif mb-6 italic text-center">Առաքման Տվյալներ</h3>
            <form id="checkout-form" class="space-y-4">
                <input type="tel" id="phone" placeholder="Հեռախոսահամար" class="w-full p-4 border rounded-xl bg-gray-50" required>
                <input type="text" id="address" placeholder="Առաքման հասցե" class="w-full p-4 border rounded-xl bg-gray-50" required>
                <div class="flex gap-2">
                    <input type="date" id="date" class="w-1/2 p-4 border rounded-xl bg-gray-50" required>
                    <input type="time" id="time" class="w-1/2 p-4 border rounded-xl bg-gray-50" required>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold mt-4">ՀԱՍՏԱՏԵԼ</button>
                <button type="button" onclick="closeOrderModal()" class="w-full text-gray-400">Չեղարկել</button>
            </form>
        </div>
    </div>

    <footer class="py-12 bg-white text-center border-t border-pink-100 mt-10">
        <p class="text-gray-400 text-sm mb-4">RegisCode - Պրոֆեսիոնալ Լուծումներ</p>
        <a href="admin.html" class="bg-gray-800 text-white px-8 py-3 rounded-full text-sm font-bold hover:bg-pink-600 transition-all">Մուտք Admin Panel</a>
    </footer>

    <script>
        let products = JSON.parse(localStorage.getItem('flowers')) || [];
        let cart = [];
        let favorites = JSON.parse(localStorage.getItem('favs')) || [];

        function render() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-pink-50 relative">
                    <button onclick="toggleFav('${p.id}')" class="absolute top-4 right-4 bg-white/80 p-2 rounded-full shadow z-10 text-xl">
                        ${favorites.includes(p.id) ? '❤️' : '🤍'}
                    </button>
                    <img src="${p.img}" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <h3 class="serif text-2xl mb-2">${p.name}</h3>
                        <p class="text-gray-400 text-sm mb-4">${p.desc}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-pink-600 font-bold text-lg">${p.price.toLocaleString()} ֏</span>
                            <button onclick="addToCart('${p.id}')" class="bg-pink-100 text-pink-600 px-4 py-2 rounded-xl font-bold hover:bg-pink-600 hover:text-white transition">🛒 Զամբյուղ</button>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('fav-count').innerText = favorites.length;
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }
        function openOrderModal() { if(cart.length > 0) document.getElementById('order-modal').classList.remove('hidden'); }
        function closeOrderModal() { document.getElementById('order-modal').classList.add('hidden'); }

        function addToCart(id) {
            const prod = products.find(p => p.id == id);
            cart.push(prod);
            updateCartUI();
        }

        function toggleFav(id) {
            favorites = favorites.includes(id) ? favorites.filter(f => f != id) : [...favorites, id];
            localStorage.setItem('favs', JSON.stringify(favorites));
            render();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            let total = 0;
            list.innerHTML = cart.map((item, index) => {
                total += parseInt(item.price);
                return `
                    <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl">
                        <span class="font-semibold text-sm">${item.name}</span>
                        <div class="flex items-center gap-4">
                            <span class="text-pink-600 font-bold">${item.price} ֏</span>
                            <button onclick="removeFromCart(${index})" class="text-red-400 text-lg">&times;</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = total.toLocaleString() + " ֏";
            document.getElementById('cart-count').innerText = cart.length;
        }

        function removeFromCart(index) { cart.splice(index, 1); updateCartUI(); }

        document.getElementById('checkout-form').onsubmit = (e) => {
            e.preventDefault();
            const order = {
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                items: cart.map(i => i.name).join(', '),
                total: document.getElementById('cart-total').innerText
            };
            let orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            alert("Պատվերը ստացված է: RegisCode Admin-ը կապ կհաստատի:");
            cart = []; updateCartUI(); closeOrderModal(); toggleCart();
        };

        render();
    </script>
</body>
</html>
